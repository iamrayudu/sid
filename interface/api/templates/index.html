<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SID — Subjective Intelligence Daemon</title>
<style>
  :root {
    --bg: #0e0f12;
    --panel: #16181d;
    --border: #262a32;
    --text: #e6e8eb;
    --muted: #8a8f99;
    --accent: #7aa2ff;
    --danger: #ff6b6b;
    --ok: #5ad19a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.2px; }
  header .status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.rec { background: var(--danger); animation: pulse 1s infinite; }
  .dot.idle { background: var(--ok); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  main { flex: 1; max-width: 820px; width: 100%; margin: 0 auto; padding: 24px; }
  .row { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }

  button.record {
    flex: 1;
    padding: 18px 24px;
    background: var(--accent);
    color: #0e0f12;
    border: 0;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button.record:hover { background: #92b4ff; }
  button.record.recording { background: var(--danger); color: #fff; }

  input[type=search] {
    flex: 1;
    padding: 12px 14px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  input[type=search]:focus { border-color: var(--accent); }

  section { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
  section h2 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); font-weight: 600; }

  .thought, .result {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .thought:last-child, .result:last-child { border-bottom: 0; }
  .thought .meta, .result .meta { color: var(--muted); font-size: 11px; margin-top: 4px; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }

  footer { padding: 12px 24px; border-top: 1px solid var(--border); color: var(--muted); font-size: 12px; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>SID — Subjective Intelligence Daemon</h1>
  <div class="status"><span id="dot" class="dot idle"></span><span id="status-text">idle</span></div>
</header>

<main>
  <div class="row">
    <button id="recBtn" class="record">Hold to record</button>
  </div>

  <div class="row">
    <input id="searchBox" type="search" placeholder="Search your thoughts..." />
  </div>

  <section id="searchSection" style="display:none">
    <h2>Search results</h2>
    <div id="searchResults"></div>
  </section>

  <section>
    <h2>Recent thoughts</h2>
    <div id="timeline"><div class="empty">No thoughts yet today.</div></div>
  </section>
</main>

<footer id="statsFooter">Today: — thoughts | LLM calls: —</footer>

<script>
const API = "";
let sessionId = null;
let recording = false;

const recBtn = document.getElementById("recBtn");
const dot = document.getElementById("dot");
const statusText = document.getElementById("status-text");
const timelineEl = document.getElementById("timeline");
const statsFooter = document.getElementById("statsFooter");
const searchBox = document.getElementById("searchBox");
const searchSection = document.getElementById("searchSection");
const searchResults = document.getElementById("searchResults");

async function api(path, opts={}) {
  const res = await fetch(API + path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
  });
  if (res.status === 204) return null;
  if (!res.ok) {
    let msg = res.statusText;
    try { msg = (await res.json()).detail || msg; } catch {}
    throw new Error(msg);
  }
  return res.json();
}

async function startRecording() {
  try {
    const r = await api("/api/voice/start", { method: "POST", body: JSON.stringify({}) });
    sessionId = r.session_id;
    recording = true;
    recBtn.textContent = "Recording... (click to stop)";
    recBtn.classList.add("recording");
  } catch (e) { alert("Start failed: " + e.message); }
}

async function stopRecording() {
  if (!sessionId) return;
  try {
    const r = await api("/api/voice/stop", {
      method: "POST",
      body: JSON.stringify({ session_id: sessionId }),
    });
    recording = false;
    sessionId = null;
    recBtn.textContent = "Hold to record";
    recBtn.classList.remove("recording");
    if (r) loadTimeline();
  } catch (e) {
    recording = false; sessionId = null;
    recBtn.textContent = "Hold to record";
    recBtn.classList.remove("recording");
    alert("Stop failed: " + e.message);
  }
}

recBtn.addEventListener("click", () => {
  if (recording) stopRecording(); else startRecording();
});

async function loadTimeline() {
  try {
    const r = await api("/api/thoughts/timeline");
    const recent = (r.thoughts || []).slice(-10).reverse();
    if (recent.length === 0) {
      timelineEl.innerHTML = '<div class="empty">No thoughts yet today.</div>';
      return;
    }
    timelineEl.innerHTML = recent.map(t => `
      <div class="thought">
        <div>${escapeHtml(t.summary || t.clean_text || t.raw_text || "")}</div>
        <div class="meta">${t.type || "raw"} · ${t.timestamp || ""}</div>
      </div>
    `).join("");
  } catch {}
}

async function pollStatus() {
  try {
    const r = await api("/api/voice/status");
    if (r.recording) { dot.className = "dot rec"; statusText.textContent = "recording"; }
    else { dot.className = "dot idle"; statusText.textContent = "idle"; }
  } catch {}
}

async function loadStats() {
  try {
    const s = await api("/api/stats");
    statsFooter.textContent = `Today: ${s.thoughts_today} thoughts | LLM calls: ${s.llm_calls_today}`;
  } catch {}
}

let searchTimer;
searchBox.addEventListener("input", () => {
  clearTimeout(searchTimer);
  const q = searchBox.value.trim();
  if (!q) { searchSection.style.display = "none"; return; }
  searchTimer = setTimeout(async () => {
    try {
      const r = await api("/api/thoughts/search?q=" + encodeURIComponent(q));
      searchSection.style.display = "block";
      if (!r.results || r.results.length === 0) {
        searchResults.innerHTML = '<div class="empty">No matches.</div>';
        return;
      }
      searchResults.innerHTML = r.results.map(s => `
        <div class="result">
          <div>${escapeHtml(s.summary || s.text || "")}</div>
          <div class="meta">${(s.type || "")} · ${s.date || ""} · score ${(s.score || 0).toFixed(2)}</div>
        </div>
      `).join("");
    } catch (e) {
      searchResults.innerHTML = `<div class="empty">Search error: ${escapeHtml(e.message)}</div>`;
      searchSection.style.display = "block";
    }
  }, 250);
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[c]);
}

loadTimeline();
loadStats();
pollStatus();
setInterval(pollStatus, 2000);
setInterval(loadStats, 30000);
setInterval(loadTimeline, 15000);
</script>
</body>
</html>
