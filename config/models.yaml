# SID Model Configuration
# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE-BASED routing: every task maps to a model independently.
# To swap any model: change the value here. Zero code changes needed.
# All names must match exactly what `ollama list` shows.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
# PROVIDER CONFIGURATION
# Define clients for multi-model hybrid routing. api_key can use env vars like ${VAR}.
# ─────────────────────────────────────────────────────────────────────────────
providers:
  local:
    client: "openai_sdk"
    base_url: "http://localhost:11434/v1"
    api_key: "ollama"
  openai:
    client: "openai_sdk"
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
  anthropic:
    client: "anthropic_sdk"
    api_key: "${ANTHROPIC_API_KEY}"

# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE-BASED ROUTING
# Assign a model and its provider for any specific task.
# ─────────────────────────────────────────────────────────────────────────────
models:
  stage1: 
    model: "qwen2.5:3b"
    provider: "local"
    
  stage2: 
    model: "qwen2.5:14b"
    provider: "local"
    
  agent_chat: 
    model: "qwen2.5:14b"
    provider: "local"
    
  morning: 
    model: "qwen2.5:14b"
    provider: "local"
    
  evening: 
    model: "qwen2.5:14b"
    provider: "local"
    
  checkin: 
    model: "qwen2.5:3b"
    provider: "local"
    
  weekly: 
    model: "qwen2.5:14b"
    provider: "local"

  critique: 
    model: "qwen2.5:14b"
    provider: "local"
    
  document: 
    model: "qwen2.5:14b"
    provider: "local"
    
  milestone: 
    model: "qwen2.5:14b"
    provider: "local"

# ─────────────────────────────────────────────────────────────────────────────
# Embedding model — sentence-transformers, runs locally on CPU. NOT Ollama.
# WARNING: changing this invalidates ALL existing LanceDB vectors.
# If changed: delete ~/.sid/vectors/ and let SID rebuild on next startup.
# ─────────────────────────────────────────────────────────────────────────────
embedding: all-MiniLM-L6-v2

# ─────────────────────────────────────────────────────────────────────────────
# Whisper STT model (trade speed vs accuracy)
# tiny.en  — 39MB,  fastest, rough accuracy
# base.en  — 74MB,  good balance (default)
# small.en — 244MB, more accurate, slower
# ─────────────────────────────────────────────────────────────────────────────
whisper_model: base.en

# ─────────────────────────────────────────────────────────────────────────────
# Cost tracking (local = $0, tracked for capacity planning)
# Set real values here if cloud fallback is added later.
# ─────────────────────────────────────────────────────────────────────────────
cost_per_1k_tokens:
  default: 0.0

# ─────────────────────────────────────────────────────────────────────────────
# Hardware reference — pick models based on available RAM
#
# Model           RAM      Latency    Best for
# qwen2.5:3b      ~2GB     1-2s       stage1, checkin
# qwen2.5:7b      ~4GB     3-4s       balanced quality/speed
# qwen2.5:14b     ~8GB     8-12s      stage2, chat, routines (default)
# qwen2.5:32b     ~18GB    25s        near GPT-4 quality locally
# gemma3:4b       ~2.5GB   2s         stage1 alt, excellent instructions
# gemma3:12b      ~7GB     6-8s       stage2 alt, document extraction
# gemma3:27b      ~15GB    20s        weekly/critique with more RAM
# phi4:14b        ~8GB     8-12s      best for critique + reasoning
# llama3.2:3b     ~2GB     1-2s       stage1 alt, very reliable
# llama3.1:8b     ~5GB     4-5s       general purpose alternative
#
# Recommended:
# 16GB RAM → qwen2.5:3b (stage1/checkin) + qwen2.5:14b (everything else)
# 32GB RAM → add phi4:14b for critique/weekly
# 64GB RAM → qwen2.5:32b for all deep tasks
# ─────────────────────────────────────────────────────────────────────────────
